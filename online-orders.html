<!doctype html>

<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Order Delivery | KATSU KATSU NYC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .font-headline {
        font-family: "Noto Serif", serif;
      }
    </style>
  </head>
  <body class="min-h-screen bg-[#1b1c15] text-[#fbfaee]">
    <main class="min-h-screen flex items-center justify-center px-6 py-12">
      <div
        class="max-w-2xl w-full border border-white/10 bg-[#25261f] p-8 md:p-12 shadow-2xl"
      >
        <p
          class="text-[#ffb5a1] font-semibold tracking-[0.25em] uppercase text-xs mb-3"
        >
          KATSU KATSU NYC
        </p>
        <h1
          class="font-headline text-4xl md:text-5xl tracking-tight mb-4 leading-tight"
        >
          Order delivery now
        </h1>
        <p class="text-[#f2f1e5]/80 text-lg mb-8">
          Same simple ordering flow as Coba: choose DoorDash, Uber Eats, or
          call for pickup.
        </p>

        <div class="grid gap-3 mb-8">
          <a
            class="px-6 py-4 bg-[#FF3008] hover:bg-[#e42b07] text-white font-black tracking-wide text-center transition-colors"
            href="https://www.doordash.com/store/katsu-katsu-new-york-31289567/"
            rel="noopener noreferrer"
            target="_blank"
            >Order on DoorDash</a
          >
          <a
            class="px-6 py-4 bg-[#06C167] hover:bg-[#05ab5b] text-black font-black tracking-wide text-center transition-colors"
            href="https://www.ubereats.com/"
            rel="noopener noreferrer"
            target="_blank"
            >Order on Uber Eats</a
          >
          <a
            class="px-6 py-4 bg-[#303129] hover:bg-[#3a3b33] text-[#fbfaee] font-bold text-center transition-colors"
            href="tel:+16463704036"
            >Call to Order: (646) 370-4036</a
          >
        </div>

        <div class="flex flex-col sm:flex-row gap-3">
          <a
            class="px-6 py-3 border border-white/25 hover:border-white/50 font-bold text-center transition-colors"
            href="code.html"
            >Back to Home</a
          >
          <a
            class="px-6 py-3 border border-[#94442e] bg-[#94442e] text-white hover:bg-[#b35c44] font-bold text-center transition-colors"
            href="code.html#menu"
            >View Menu First</a
          >
        </div>
      </div>
    </main>
  </body>
</html>
